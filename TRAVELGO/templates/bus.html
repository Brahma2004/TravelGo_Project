<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bus Booking - TravelGo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body,html{
margin:0;
padding:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
min-height:100vh;
color:white;
}

.bg-container{
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=2000&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
padding:40px 20px;
box-sizing:border-box;
}

.container{
max-width:900px;
margin:auto;
}

.header-title{
text-align:center;
color:#ffcc00;
font-size:2.5em;
margin-bottom:30px;
}

.search-bar{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.search-input{
padding:12px;
border-radius:5px;
border:none;
background:white;
color:#333;
font-size:0.95em;
}

.btn-search{
background:#ffcc00;
color:#000;
border:none;
padding:12px 25px;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.btn-search:hover{
background:#e6b800;
}

.list-container{
display:flex;
flex-direction:column;
gap:15px;
}

.list-item{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:8px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.item-details .title{
font-size:1.2em;
font-weight:bold;
}

.sub-info{
font-size:0.9em;
color:#eee;
}

.btn-book{
background:#ffcc00;
color:#000;
padding:10px 20px;
border-radius:5px;
text-decoration:none;
font-weight:bold;
}

.btn-book:hover{
background:#e6b800;
}

.no-results{
text-align:center;
font-size:1.2em;
margin-top:30px;
}

.back-link{
display:block;
text-align:center;
margin-top:40px;
color:white;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<div class="bg-container">

<div class="container">

<h2 class="header-title">🚌 Bus Booking</h2>

<form class="search-bar" method="GET" action="/bus">

<select class="search-input" name="source">
<option value="">Source</option>
<option value="Hyderabad">Hyderabad</option>
<option value="Chennai">Chennai</option>
<option value="Bangalore">Bangalore</option>
<option value="Mumbai">Mumbai</option>
<option value="Delhi">Delhi</option>
</select>

<select class="search-input" name="destination">
<option value="">Destination</option>
<option value="Bangalore">Bangalore</option>
<option value="Hyderabad">Hyderabad</option>
<option value="Chennai">Chennai</option>
<option value="Pune">Pune</option>
<option value="Goa">Goa</option>
</select>

<input type="date" class="search-input" name="date">

<input type="number" class="search-input" name="seats" min="1" value="1" style="width:80px">

<button class="btn-search">Search</button>

</form>


<div class="list-container">

{% if buses %}

{% for bus in buses %}

<div class="list-item">

<div class="item-details">

<div class="title">
<i class="fa-solid fa-bus"></i>
{{ bus.name }}
</div>

<div class="sub-info">

{{ bus.source }} → {{ bus.dest }}

• ₹{{ bus.price }}/seat

</div>

</div>

<a href="/seat/{{ bus.id }}/{{ bus.price }}" class="btn-book">

Book

</a>

</div>

{% endfor %}

{% else %}

<div class="no-results">

No buses found for selected route.

</div>

{% endif %}

</div>

<a href="/dashboard" class="back-link">← Back to Dashboard</a>

</div>

</div>

</body>
</html>
