<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seat - TravelGo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#666;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.seat-container{
text-align:center;
max-width:450px;
width:100%;
}

h2{
color:#ffcc00;
margin-bottom:10px;
}

.sub-header{
margin-bottom:30px;
}

.seat-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
justify-content:center;
margin-bottom:40px;
}

.seat{
width:55px;
height:55px;
background:#f0f0f0;
color:#333;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.seat:hover{
transform:translateY(-2px);
}

.seat.selected{
background:#ffcc00;
color:#000;
box-shadow:0 0 10px rgba(255,204,0,0.7);
}

.btn-confirm{
background:#ffcc00;
color:#222;
padding:15px;
width:100%;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn-confirm:disabled{
background:#999;
color:#555;
cursor:not-allowed;
}

.footer-note{
margin-top:20px;
color:#bbb;
font-size:12px;
}

.hidden-inputs{
display:none;
}

</style>
</head>

<body>

<div class="seat-container">

<h2>Select Seats for {{ id }}</h2>

<div class="sub-header">
Seat Price: ₹{{ price }}
</div>

<form action="/book" method="POST">

<div class="hidden-inputs">

<input type="hidden" name="transport_id" value="{{ id }}">

<input type="hidden" id="basePrice" value="{{ price }}">

<input type="hidden" name="price" id="finalPrice" value="{{ price }}">

<input type="hidden" name="seat" id="selectedSeats">

</div>

<div class="seat-grid">

{% for i in range(1,21) %}

<div class="seat" onclick="toggleSeat(this, {{i}})">

{{i}}

</div>

{% endfor %}

</div>

<button type="submit" id="confirmBtn" class="btn-confirm" disabled>

Confirm Seats & Pay

</button>

</form>

<div class="footer-note">
* Select one or multiple seats
</div>

</div>

<script>

const selectedSeats = new Set();

const confirmBtn = document.getElementById("confirmBtn");

const seatInput = document.getElementById("selectedSeats");

const basePrice = parseFloat(document.getElementById("basePrice").value);

const finalPriceInput = document.getElementById("finalPrice");

function toggleSeat(el, seat){

el.classList.toggle("selected");

if(selectedSeats.has(seat)){
selectedSeats.delete(seat);
}else{
selectedSeats.add(seat);
}

const seats = Array.from(selectedSeats).sort((a,b)=>a-b);

seatInput.value = seats.join(",");

const count = seats.length;

const total = count * basePrice;

if(count>0){

confirmBtn.disabled=false;

confirmBtn.innerText=`Pay ₹${total} for ${count} seat(s)`;

finalPriceInput.value=total;

}else{

confirmBtn.disabled=true;

confirmBtn.innerText="Confirm Seats & Pay";

}

}

</script>

</body>
</html>
